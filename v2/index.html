<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f0eee9" />
  <title>이정효 · 정답은 있다 — 저자와 대화 (v2)</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='5' y='5' width='22' height='22' rx='4' fill='%233D2EE0'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='-apple-system,sans-serif' font-weight='700' font-size='15' fill='%23ffffff'%3E답%3C/text%3E%3C/svg%3E" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>
  <div class="phone">
    <header class="chat-header">
      <button class="back" aria-label="뒤로">‹</button>
      <div class="title">
        <div class="name">이정효</div>
        <div class="sub">『정답은 있다』 저자</div>
      </div>
      <button id="collection-btn" class="icon-btn" aria-label="구절 컬렉션" title="이정효의 일침">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span id="collection-count" class="badge-count" hidden>0</span>
      </button>
      <button id="bookmark-list-btn" class="icon-btn" aria-label="북마크 보기" title="북마크">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span id="bookmark-count" class="badge-count" hidden>0</span>
      </button>
      <button id="save-png" class="icon-btn" aria-label="대화 저장" title="대화를 이미지로 저장">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </button>
    </header>

    <main id="chat" class="chat" aria-live="polite"></main>

    <div id="quick" class="quick" hidden></div>

    <form id="form" class="composer">
      <input id="input" type="text" placeholder="저자에게 물어보세요" autocomplete="off" />
      <button id="send" type="submit" class="send" aria-label="보내기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </form>
  </div>

  <dialog id="source-modal" class="source-modal">
    <div class="source-modal-card">
      <header class="source-modal-head">
        <strong id="source-modal-title">근거</strong>
        <button type="button" id="source-modal-close" aria-label="닫기">×</button>
      </header>
      <div id="source-modal-body" class="source-modal-body"></div>
    </div>
  </dialog>

  <dialog id="collection-modal" class="source-modal">
    <div class="source-modal-card">
      <header class="source-modal-head">
        <strong>📖 이정효의 일침</strong>
        <button type="button" id="collection-modal-close" aria-label="닫기">×</button>
      </header>
      <div id="collection-modal-body" class="source-modal-body collection-list"></div>
    </div>
  </dialog>

  <dialog id="bookmark-modal" class="source-modal">
    <div class="source-modal-card">
      <header class="source-modal-head">
        <strong>북마크</strong>
        <button type="button" id="bookmark-modal-close" aria-label="닫기">×</button>
      </header>
      <div id="bookmark-modal-body" class="source-modal-body bookmark-list"></div>
    </div>
  </dialog>

  <div id="config-banner" class="banner" hidden>
    <strong>API URL 미설정.</strong>
    데모 URL 끝에 <code>?api=https://xxx.trycloudflare.com/&lt;KEY&gt;</code> 형태로 백엔드 주소를 붙여 주세요.
  </div>

  <script src="app.js"></script>
</body>
</html>
